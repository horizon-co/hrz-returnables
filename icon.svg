<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="error" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Railway fork - main stem -->
  <path d="M 128 40 L 128 120" stroke="#4a5568" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Success branch (left, curving down-left then down) -->
  <path d="M 128 120 Q 128 150 88 160 L 88 216" stroke="url(#success)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Error branch (right, curving down-right then down) -->
  <path d="M 128 120 Q 128 150 168 160 L 168 216" stroke="url(#error)" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Fork junction dot -->
  <circle cx="128" cy="120" r="10" fill="#e2e8f0"/>

  <!-- Success checkmark -->
  <polyline points="76,198 86,210 102,192" stroke="#00d2ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Error X -->
  <line x1="158" y1="192" x2="178" y2="210" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round"/>
  <line x1="178" y1="192" x2="158" y2="210" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round"/>

  <!-- Input dot at top -->
  <circle cx="128" cy="40" r="8" fill="#e2e8f0"/>
</svg>
